name: Rust

on:
  push:
    branches: [ "master", "claude/**" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install toolchain components
      run: rustup component add rustfmt clippy
    - name: Check formatting
      run: cargo fmt --all --check
    - name: Clippy (warnings as errors)
      run: cargo clippy --all-targets -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Clippy (bigfloat feature)
      run: cargo clippy --all-targets --features bigfloat -- -D warnings
    - name: Run tests (bigfloat feature)
      run: cargo test --features bigfloat --verbose
    - name: Build release
      run: cargo build --release --verbose
